# SPDX-License-Identifier: MIT
# Composite action: set up Go on the self-hosted WSL runners *safely*.
#
# Root cause: setup-go@v5 installs GOROOT under
#   ~/actions-runner-*/_work/_tool/go/1.26.4
# on the WSL2 ext4 disk. That filesystem intermittently read-corrupts the
# `compile` tool and stdlib files (zero-byte src/log/internal/*, "fork/exec
# compile: invalid argument", SIGBUS in the linker). The corruption is
# flaky — the same runner can build cleanly on one job and fail the next —
# and survives a purge+re-download because setup-go re-extracts to the same
# bad disk. A minimal `func main(){}` probe even passes, because the linker
# reuses precompiled stdlib objects; it only blows up when `go install`
# actually invokes the corrupt `compile` binary.
#
# Fix: copy the freshly-installed GOROOT to tmpfs (/dev/shm = RAM) and point
# GOROOT there for the rest of the job. RAM is not subject to ext4 read
# corruption, so every subsequent `go build`/`go install` uses a stable,
# in-memory toolchain. ~600MB in /dev/shm; the WSL runners have ample RAM.
#
# IMPORTANT: the three self-hosted runners (wsl-runner-1/2/3) all live in the
# SAME WSL VM and therefore share ONE /dev/shm. A fixed staging path made the
# three concurrent jobs stomp each other ("cp: cannot create directory: File
# exists", "compile: Text file busy", "rm: Directory not empty", "cannot find
# GOROOT"). We stage to a per-runner path (/dev/shm/goroot-$RUNNER_NAME);
# since each runner runs one job at a time, that path is never contended.
#
# We stay on `go-version: stable` (latest, currently 1.26.4) and NEVER pin
# back to an older minor just to dodge a bad cache entry.
name: setup-go-safe
description: Install latest Go on self-hosted runners, staging GOROOT to tmpfs to escape WSL2 disk corruption.

runs:
  using: composite
  steps:
    - name: Purge corrupt Go toolcache (self-hosted runner workaround)
      shell: bash
      run: |
        set -euo pipefail
        : "${RUNNER_TOOL_CACHE:?RUNNER_TOOL_CACHE must be set on self-hosted runners}"
        rm -rf "$RUNNER_TOOL_CACHE/go/1.26.4" || true

    - name: Install Go (latest stable)
      id: go-install
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version: stable
        check-latest: true
        # Disable Actions module-cache restore: on the self-hosted WSL
        # runners it produces a flood of `tar: Cannot open: File exists`
        # errors restoring ~/go/pkg/mod, and a half-restored module cache
        # can itself cause spurious build failures. Re-fetching is cheap.
        cache: false

    - name: Stage GOROOT to tmpfs (escape WSL2 ext4 read corruption)
      id: stage
      shell: bash
      run: |
        set -e
        : "${RUNNER_NAME:?RUNNER_NAME must be set on self-hosted runners}"
        SRC="$(go env GOROOT)"
        DST="/dev/shm/goroot-${RUNNER_NAME}"
        rm -rf "$DST"
        cp -a "$SRC" "$DST"
        echo "GOROOT=$DST" >> "$GITHUB_ENV"
        # Save the original ext4 GOROOT path so ci-go-retry.sh can re-stage
        # the tmpfs copy between retries (tmpfs GOROOT can also corrupt).
        echo "GOROOT_SRC=$SRC" >> "$GITHUB_ENV"
        echo "Staged Go toolchain to tmpfs: $DST (from $SRC)"

    - name: Verify toolchain integrity (stdlib + compile binary)
      id: verify
      continue-on-error: true
      shell: bash
      run: |
        set -e
        echo "Using GOROOT=$GOROOT"
        tmp="$(mktemp -d)"
        trap 'rm -rf "$tmp"' EXIT
        # importing `log` forces the corrupt src/log/internal/* to be compiled
        printf 'package main\nimport "log"\nfunc main(){ log.Println("probe") }\n' > "$tmp/probe.go"
        go build -o /dev/null "$tmp/probe.go"
        # exercise the flaky compile binary directly
        "$(go env GOROOT)/pkg/tool/$(go env GOHOSTOS)_$(go env GOHOSTARCH)/compile" -V
        # probe gofmt: an unformatted snippet must produce a non-empty diff.
        # A corrupt tmpfs gofmt binary would crash or produce no output.
        printf 'package main\nfunc main( ){\n x:=1\n_ =x\n}\n' > "$tmp/fmt.go"
        diff_out="$(gofmt -d "$tmp/fmt.go" 2>&1)" || true
        if [ -z "$diff_out" ]; then
          echo "::error::gofmt probe failed: no diff on deliberately unformatted input"
          exit 1
        fi
        echo "::notice::Go toolchain OK (tmpfs) ($(go version))"

    - name: Re-purge + re-install + re-stage on corruption
      if: steps.verify.outcome == 'failure'
      shell: bash
      run: |
        set -euo pipefail
        : "${RUNNER_TOOL_CACHE:?RUNNER_TOOL_CACHE must be set on self-hosted runners}"
        : "${RUNNER_NAME:?RUNNER_NAME must be set on self-hosted runners}"
        echo "::warning::Go toolchain corrupt even on tmpfs; re-downloading toolchain once."
        rm -rf "$RUNNER_TOOL_CACHE/go" "/dev/shm/goroot-${RUNNER_NAME}"

    - name: Re-install Go (latest stable)
      if: steps.verify.outcome == 'failure'
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version: stable
        check-latest: true
        cache: false

    - name: Re-stage GOROOT to tmpfs
      if: steps.verify.outcome == 'failure'
      shell: bash
      run: |
        set -e
        : "${RUNNER_NAME:?RUNNER_NAME must be set on self-hosted runners}"
        SRC="$(go env GOROOT)"
        DST="/dev/shm/goroot-${RUNNER_NAME}"
        rm -rf "$DST"
        cp -a "$SRC" "$DST"
        echo "GOROOT=$DST" >> "$GITHUB_ENV"
        echo "GOROOT_SRC=$SRC" >> "$GITHUB_ENV"

    - name: Re-verify toolchain integrity
      if: steps.verify.outcome == 'failure'
      shell: bash
      run: |
        set -e
        tmp="$(mktemp -d)"
        trap 'rm -rf "$tmp"' EXIT
        printf 'package main\nimport "log"\nfunc main(){ log.Println("probe") }\n' > "$tmp/probe.go"
        go build -o /dev/null "$tmp/probe.go"
        "$(go env GOROOT)/pkg/tool/$(go env GOHOSTOS)_$(go env GOHOSTARCH)/compile" -V
        # probe gofmt (same check as the initial verify step)
        printf 'package main\nfunc main( ){\n x:=1\n_ =x\n}\n' > "$tmp/fmt.go"
        diff_out="$(gofmt -d "$tmp/fmt.go" 2>&1)" || true
        if [ -z "$diff_out" ]; then
          echo "::error::gofmt probe failed after re-stage: no diff on deliberately unformatted input"
          exit 1
        fi
        echo "::notice::Go toolchain OK after re-stage ($(go version))"

    - name: Cap Go build/test parallelism (fewer concurrent compiler execs)
      shell: bash
      # The flaky tmpfs `compile` "invalid argument" corruption only surfaces
      # under a full parallel build (the single-package verify probe never
      # trips it). On these 32-core WSL boxes `go build ./...` would fork ~32
      # concurrent execs of the tmpfs compile binary; capping -p/GOMAXPROCS to
      # 4 cuts the concurrency that triggers it (and matches our test-CPU cap).
      run: |
        echo "GOFLAGS=-p=4" >> "$GITHUB_ENV"
        echo "GOMAXPROCS=4" >> "$GITHUB_ENV"

    - name: Stage GOCACHE + GOTMPDIR to tmpfs (escape ext4 write→exec race)
      shell: bash
      # Staging GOROOT to tmpfs fixed the toolchain read-corruption, but the
      # build/test steps still write into two ext4 paths and immediately exec
      # what they wrote — which is the *other* half of the "fork/exec …:
      # invalid argument" race on these WSL2 runners:
      #   • GOCACHE (~/.cache/go-build) — compiled package objects the linker
      #     reads back, and cached test/vet action binaries it re-execs;
      #   • GOTMPDIR ($TMPDIR) — `go test` writes each package's test binary
      #     here and execs it, the single most exec-heavy step in CI.
      # Point both at the same per-runner tmpfs used for GOROOT so nothing the
      # build produces is ever written to, then exec'd from, the flaky ext4
      # disk. Per-runner paths keep the three runners-in-one-VM from colliding
      # on a shared /dev/shm (same reasoning as the GOROOT staging above).
      run: |
        set -e
        : "${RUNNER_NAME:?RUNNER_NAME must be set on self-hosted runners}"
        CACHE="/dev/shm/gocache-${RUNNER_NAME}"
        GTMP="/dev/shm/gotmp-${RUNNER_NAME}"
        rm -rf "$CACHE" "$GTMP"
        mkdir -p "$CACHE" "$GTMP"
        echo "GOCACHE=$CACHE" >> "$GITHUB_ENV"
        echo "GOTMPDIR=$GTMP" >> "$GITHUB_ENV"
        echo "Staged GOCACHE ($CACHE) and GOTMPDIR ($GTMP) to tmpfs"

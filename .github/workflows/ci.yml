# SPDX-License-Identifier: MIT
# CI for Milestone 0 — build, test, vet, deps-check, multi-arch cross-build.
# Codegen-in-sync is enforced: `make gen` must produce no diff against what
# is checked in (DECISIONS G2).

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...

  race:
    # Race detector needs cgo, so it can't run in the default CGO_ENABLED=0
    # build matrix. We run it once on Linux with cgo enabled to surface
    # concurrent-code regressions in kernel/bus, kernel/journal, etc.
    name: race (linux, cgo)
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go test -race ./...

  e2e:
    # Runtime/E2E gate: boot the real daemon and smoke every core product surface
    # end-to-end (keyless echo mock) — control-plane loop, OpenAI chat incl.
    # streaming, native REST, auth/input-validation (401/400/413), concurrency,
    # halt→resume, graceful shutdown with 0 panics. Catches regressions that unit
    # tests miss (e.g. M550, where streaming dropped a non-streaming provider's
    # answer). See scripts/e2e-smoke.sh.
    name: e2e smoke (linux)
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Build binaries
        run: |
          go build -o /tmp/agezt ./cmd/agezt
          go build -o /tmp/agt ./cmd/agt
      - name: E2E smoke (real daemon, every core surface)
        run: bash scripts/e2e-smoke.sh /tmp/agezt /tmp/agt

  codegen-in-sync:
    name: codegen-in-sync
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Regenerate SDK types
        run: |
          go run ./tools/jsonschemagen \
            -in  .project/agezt-contract.jsonc \
            -out contract/gen/types.gen.go \
            -pkg gen
      - name: Verify no drift
        run: |
          if ! git diff --exit-code -- contract/gen/; then
            echo "::error::contract/gen/ is out of sync with the contract."
            echo "Run \`make gen\` and commit the result."
            exit 1
          fi

  frontend-dist-in-sync:
    name: frontend-dist-in-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build the Web UI bundle
        run: |
          cd frontend
          npm ci
          npm run build
      - name: Verify no drift
        run: |
          if ! git diff --exit-code -- kernel/webui/dist/; then
            echo "::error::kernel/webui/dist/ is out of sync with frontend/ sources."
            echo "Run \`make frontend-build\` and commit the result."
            exit 1
          fi

  frontend-test:
    name: frontend-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Unit-test the Web UI logic (Vitest)
        run: |
          cd frontend
          npm ci
          npm test

  python-sdk:
    name: python-sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      # The SDK and its tests are standard-library only — no pip install needed.
      - name: Test the Python SDK
        run: |
          cd sdk/python
          python -m unittest discover -s tests

  typescript-sdk:
    name: typescript-sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      # Only devDep is TypeScript; the SDK itself has zero runtime deps. `npm test`
      # type-checks + compiles (tsc) then runs the node:test suite.
      - name: Test the TypeScript SDK
        run: |
          cd sdk/typescript
          npm ci
          npm test

  rust-sdk:
    name: rust-sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      # The SDK has zero runtime dependencies (std only), so there is nothing to
      # fetch — `cargo test` compiles the crate + the TcpListener-mock integration
      # tests and runs them. `cargo fmt --check` enforces formatting, mirroring
      # the Go gofmt gate (Rust's toolchain ships rustfmt, so unlike black/prettier
      # for the Py/TS SDKs it costs nothing extra here).
      - name: Format + test the Rust SDK
        run: |
          cd sdk/rust
          cargo fmt --check
          cargo test --verbose

  multi-arch:
    name: cross-build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: '0'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: freebsd, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Generate SDK types
        run: |
          go run ./tools/jsonschemagen \
            -in  .project/agezt-contract.jsonc \
            -out contract/gen/types.gen.go \
            -pkg gen
      - name: Cross-build
        env:
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags='-s -w' -o /tmp/out/ ./cmd/...

  deps-check:
    name: deps-check (allowlist, POLICY §1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Verify every module is in tools/depscheck/allowlist.txt
        run: go run ./tools/depscheck

  lint:
    # Static-analysis gates driven clean in M485/M487. gofmt + staticcheck are
    # zero-tolerance; govulncheck catches new advisories (the toolchain is the
    # latest stable, which carries the patched stdlib).
    name: lint (gofmt, staticcheck, govulncheck)
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
      - name: gofmt (no diff)
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          "$(go env GOPATH)/bin/staticcheck" ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  secrets:
    # Secret scan, baselined to zero in M486. The full git history is scanned
    # (fetch-depth: 0); .gitleaks.toml at the repo root keeps the default ruleset
    # and allowlists only the known secret-shaped test fixtures.
    name: secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: gitleaks
        # Install from the module's canonical path. gitleaks moved GitHub orgs
        # (zricethezav → gitleaks) but its go.mod still declares the module as
        # github.com/zricethezav/gitleaks/v8, so `go install github.com/gitleaks/
        # gitleaks/v8@latest` fails with a module-path mismatch. Use the declared
        # path. (M559: this is the path gitleaks@latest actually resolves under.)
        run: |
          go install github.com/zricethezav/gitleaks/v8@latest
          "$(go env GOPATH)/bin/gitleaks" detect --no-banner --redact -s .

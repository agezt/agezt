# SPDX-License-Identifier: MIT
# CI for Milestone 0 — build, test, vet, deps-check, multi-arch cross-build.
# Codegen-in-sync is enforced: `make gen` must produce no diff against what
# is checked in (DECISIONS G2).

name: CI

# All jobs run on self-hosted WSL-Ubuntu runners (wsl-runner-1..3): the org's
# GitHub-hosted minutes are blocked by Actions billing ("payments have failed /
# spending limit"), and self-hosted runners are free and unaffected. The
# macOS/Windows legs of the test matrix are parked until hosted runners are
# back (cross-build below still compile-gates darwin/windows/freebsd, and the
# owner develops on Windows daily). To restore: matrix os
# [ubuntu-latest, macos-latest, windows-latest] + runs-on ${{ matrix.os }}.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: jobs only read the checkout. No job needs write scopes.
permissions:
  contents: read

jobs:
  test:
    name: test (linux)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64]
    env:
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go-safe
      - run: bash scripts/ci-go-retry.sh go vet ./...
      - run: bash scripts/ci-go-retry.sh go test ./...
      - run: bash scripts/ci-go-retry.sh go build ./...

  race:
    # Race detector needs cgo, so it can't run in the default CGO_ENABLED=0
    # build matrix. We run it once on Linux with cgo enabled to surface
    # concurrent-code regressions in kernel/bus, kernel/journal, etc.
    name: race (linux, cgo)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64]
    env:
      CGO_ENABLED: '1'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go-safe
      - run: bash scripts/ci-go-retry.sh go test -race ./...

  e2e:
    # Runtime/E2E gate: boot the real daemon and smoke every core product surface
    # end-to-end (keyless echo mock) — control-plane loop, OpenAI chat incl.
    # streaming, native REST, auth/input-validation (401/400/413), concurrency,
    # halt→resume, graceful shutdown with 0 panics. Catches regressions that unit
    # tests miss (e.g. M550, where streaming dropped a non-streaming provider's
    # answer). See scripts/e2e-smoke.sh.
    name: e2e smoke (linux)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64]
    env:
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go-safe
      - name: Build binaries
        run: |
          bash scripts/ci-go-retry.sh go build -o /tmp/agezt ./cmd/agezt
          bash scripts/ci-go-retry.sh go build -o /tmp/agt ./cmd/agt
      - name: E2E smoke (real daemon, every core surface)
        run: bash scripts/e2e-smoke.sh /tmp/agezt /tmp/agt

  codegen-in-sync:
    name: codegen-in-sync
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64]
    env:
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go-safe
      - name: Regenerate SDK types
        run: |
          bash scripts/ci-go-retry.sh go run ./tools/jsonschemagen \
            -in  .project/agezt-contract.jsonc \
            -out contract/gen/types.gen.go \
            -pkg gen
      - name: Verify no drift
        run: |
          if ! git diff --exit-code -- contract/gen/; then
            echo "::error::contract/gen/ is out of sync with the contract."
            echo "Run \`make gen\` and commit the result."
            exit 1
          fi

  frontend-dist-in-sync:
    name: frontend-dist-in-sync
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build the Web UI bundle
        run: |
          cd frontend
          npm ci
          npm run build
      - name: Verify no drift
        run: |
          if ! git diff --exit-code -- kernel/webui/dist/; then
            echo "::error::kernel/webui/dist/ is out of sync with frontend/ sources."
            echo "Run \`make frontend-build\` and commit the result."
            exit 1
          fi

  frontend-test:
    name: frontend-test
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Unit-test the Web UI logic (Vitest)
        run: |
          cd frontend
          npm ci
          npm test

  webui-e2e:
    name: webui-e2e
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64]
    env:
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go-safe
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build binaries
        run: |
          bash scripts/ci-go-retry.sh go build -o /tmp/agezt ./cmd/agezt
          bash scripts/ci-go-retry.sh go build -o /tmp/agt ./cmd/agt
      # The SPA tested is the committed go:embed bundle in kernel/webui/dist —
      # no `npm run build` here; we drive what actually ships.
      - name: Install Web UI deps + Playwright browser
        run: |
          cd frontend
          npm ci
          npx playwright install --with-deps chromium
      - name: Web UI e2e (real daemon, headless browser)
        run: bash scripts/webui-e2e.sh /tmp/agezt /tmp/agt

  python-sdk:
    name: python-sdk
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'
      # The SDK and its tests are standard-library only — no pip install needed.
      - name: Test the Python SDK
        run: |
          cd sdk/python
          python -m unittest discover -s tests

  typescript-sdk:
    name: typescript-sdk
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      # Only devDep is TypeScript; the SDK itself has zero runtime deps. `npm test`
      # type-checks + compiles (tsc) then runs the node:test suite.
      - name: Test the TypeScript SDK
        run: |
          cd sdk/typescript
          npm ci
          npm test

  rust-sdk:
    name: rust-sdk
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      # Pinned to a commit SHA (supply-chain). dtolnay/rust-toolchain infers the
      # channel from the git ref, so when pinned by SHA the channel must be given
      # explicitly via `toolchain:`.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt
      # The SDK has zero runtime dependencies (std only), so there is nothing to
      # fetch — `cargo test` compiles the crate + the TcpListener-mock integration
      # tests and runs them. `cargo fmt --check` enforces formatting, mirroring
      # the Go gofmt gate (Rust's toolchain ships rustfmt, so unlike black/prettier
      # for the Py/TS SDKs it costs nothing extra here).
      - name: Format + test the Rust SDK
        run: |
          cd sdk/rust
          cargo fmt --check
          cargo test --verbose

  multi-arch:
    name: cross-build (${{ matrix.goos }}/${{ matrix.goarch }})
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64]
    env:
      CGO_ENABLED: '0'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: freebsd, goarch: amd64 }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go-safe
      - name: Generate SDK types
        run: |
          bash scripts/ci-go-retry.sh go run ./tools/jsonschemagen \
            -in  .project/agezt-contract.jsonc \
            -out contract/gen/types.gen.go \
            -pkg gen
      - name: Cross-build
        env:
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: bash scripts/ci-go-retry.sh go build -trimpath -ldflags='-s -w' -o /tmp/out/ ./cmd/...

  deps-check:
    name: deps-check (allowlist, POLICY §1)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go-safe
      - name: Verify every module is in tools/depscheck/allowlist.txt
        run: bash scripts/ci-go-retry.sh go run ./tools/depscheck
      - name: Verify SDK parity report is up to date
        run: bash scripts/ci-go-retry.sh go run ./tools/sdkparity -check docs/SDK-PARITY.md

  lint:
    # Static-analysis gates driven clean in M485/M487. gofmt + staticcheck are
    # zero-tolerance; govulncheck catches new advisories (the toolchain is the
    # latest stable, which carries the patched stdlib).
    name: lint (gofmt, staticcheck, govulncheck)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64]
    env:
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go-safe
      - name: gofmt (no diff)
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi
      - name: staticcheck (prebuilt binary, retry — flaky WSL go compiler)
        # We use the upstream PREBUILT staticcheck so we don't `go install` its
        # large dep tree. But staticcheck still type-checks via go/packages,
        # which execs the local `compile` tool — and that tool intermittently
        # corrupts on the self-hosted WSL runners ("fork/exec compile: invalid
        # argument", "src/log/internal/: invalid argument"). The corruption is
        # transient, so retry the run a few times like govulncheck below.
        run: |
          set -e
          # Pin the staticcheck release (supply-chain, CWE-494) rather than
          # tracking "latest", and verify the tarball against the publisher's
          # signed .sha256 sidecar before extracting. go-tools release assets are
          # version-LESS (e.g. staticcheck_linux_amd64.tar.gz).
          SC_TAG=2026.1
          base="https://github.com/dominikh/go-tools/releases/download/${SC_TAG}"
          curl -fsSL "${base}/staticcheck_linux_amd64.tar.gz" -o /tmp/sc.tgz
          curl -fsSL "${base}/staticcheck_linux_amd64.tar.gz.sha256" -o /tmp/sc.sha256
          want=$(awk '{print $1}' /tmp/sc.sha256)
          got=$(sha256sum /tmp/sc.tgz | awk '{print $1}')
          if [ -z "$want" ] || [ "$want" != "$got" ]; then
            echo "::error::staticcheck checksum mismatch (want=$want got=$got)"
            exit 1
          fi
          tar xzf /tmp/sc.tgz -C /tmp
          echo "staticcheck ${SC_TAG} (prebuilt, checksum-verified)"
          set +e
          n=0
          while [ $n -lt 5 ]; do
            /tmp/staticcheck/staticcheck ./... && exit 0
            n=$((n+1))
            echo "staticcheck attempt $n/5 failed (flaky Go compiler on self-hosted runners); retrying..."
            sleep 3
          done
          echo "::error::staticcheck failed after 5 attempts"
          exit 1
      - name: "govulncheck (retry — flaky WSL go compiler)"
        # govulncheck has no prebuilt binary, so we must `go install` it and
        # that exercises the flaky compiler. Retry the install+run a few
        # times — the corruption is intermittent, so a re-attempt usually
        # succeeds.
        run: |
          set +e
          n=0
          # Pinned version (supply-chain, CWE-494). `go install` with a fixed
          # version verifies the module against the Go checksum database; bump
          # deliberately rather than tracking @latest.
          while [ $n -lt 5 ]; do
            go install golang.org/x/vuln/cmd/govulncheck@v1.4.0
            "$(go env GOPATH)/bin/govulncheck" ./... && exit 0
            n=$((n+1))
            echo "govulncheck attempt $n/5 failed (flaky Go compiler on self-hosted runners); retrying..."
            sleep 3
          done
          echo "::error::govulncheck failed after 5 attempts"
          exit 1

  secrets:
    # Secret scan, baselined to zero in M486. The full git history is scanned
    # (fetch-depth: 0); .gitleaks.toml at the repo root keeps the default ruleset
    # and allowlists only the known secret-shaped test fixtures.
    name: secrets (gitleaks)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-go-safe
      - name: gitleaks
        # Install from the module's canonical path. gitleaks moved GitHub orgs
        # (zricethezav → gitleaks) but its go.mod still declares the module as
        # github.com/zricethezav/gitleaks/v8, so `go install github.com/gitleaks/
        # gitleaks/v8@latest` fails with a module-path mismatch. Use the declared
        # path. (M559: this is the path gitleaks@latest actually resolves under.)
        run: |
          # Pinned version (supply-chain, CWE-494); `go install` verifies the
          # module via the Go checksum database. Module path stays zricethezav/*
          # per the note above. Bump deliberately rather than tracking @latest.
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          "$(go env GOPATH)/bin/gitleaks" detect --no-banner --redact -s .

<!doctype html>
<!-- SPDX-License-Identifier: MIT -->
<!-- Agezt Web UI v1 — server-rendered, SSE-driven, zero build chain.
     One self-contained page: vanilla JS, EventSource for the live feed,
     fetch for the read panels. The token is read from this page's own URL
     (the operator opened /?token=…), so every request re-presents it.

     XSS safety: every value that originates from the bus or the control
     plane (event kinds/subjects, entity names, memory text, …) is rendered
     with textContent via DOM construction — never string-interpolated into
     innerHTML. The only innerHTML use is clearing nodes ("" ). -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agezt · Live Monitor</title>
<style>
  :root {
    --bg: #0b0e14; --panel: #131722; --panel2: #0f1320; --line: #1f2633;
    --fg: #c9d1d9; --dim: #6b7585; --accent: #58a6ff; --good: #3fb950;
    --warn: #d29922; --bad: #f85149; --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg); font: 13px/1.5 var(--mono); }
  header { display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    border-bottom: 1px solid var(--line); background: var(--panel2); position: sticky; top: 0; z-index: 2; }
  header h1 { font-size: 14px; margin: 0; letter-spacing: .5px; }
  header h1 b { color: var(--accent); }
  .act { background: var(--panel); color: var(--fg); border: 1px solid var(--line);
    border-radius: 6px; font: inherit; font-size: 11px; padding: 3px 10px; cursor: pointer; }
  .act:hover { border-color: var(--accent); }
  .act.danger { color: var(--bad); border-color: var(--bad); }
  .act.danger:hover { background: var(--bad); color: #fff; }
  .act.mini { padding: 1px 8px; font-size: 10px; }
  .act.ok { color: var(--good); border-color: var(--good); }
  #conn { margin-left: auto; font-size: 11px; color: var(--dim); }
  #conn.live { color: var(--good); }
  #conn.down { color: var(--bad); }
  .grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 12px; padding: 12px; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
  .panel > h2 { margin: 0; padding: 8px 12px; font-size: 11px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--dim); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 8px; }
  .panel > h2 button { margin-left: auto; background: none; border: 1px solid var(--line);
    color: var(--dim); border-radius: 5px; font: inherit; font-size: 10px; padding: 1px 7px; cursor: pointer; }
  .panel > h2 button:hover { color: var(--fg); border-color: var(--accent); }
  .body { padding: 8px 12px; overflow: auto; }
  #feed { grid-row: span 3; max-height: calc(100vh - 90px); }
  #feed .body { padding: 0; }
  .ev { display: grid; grid-template-columns: 64px 1fr; gap: 8px; padding: 4px 12px;
    border-bottom: 1px solid var(--panel2); white-space: nowrap; }
  .ev:hover { background: var(--panel2); }
  .ev .seq { color: var(--dim); text-align: right; }
  .ev .kind { color: var(--accent); }
  .ev .subj { color: var(--fg); }
  .ev .meta { color: var(--dim); }
  pre { margin: 0; white-space: pre-wrap; word-break: break-word; color: var(--fg); }
  .kv { display: grid; grid-template-columns: auto 1fr; gap: 2px 12px; margin: 0; }
  .kv dt { color: var(--dim); }
  .kv dd { margin: 0; word-break: break-word; }
  .muted { color: var(--dim); }
  .err { color: var(--bad); }
  .item { margin: 3px 0; display: flex; gap: 6px; align-items: baseline; flex-wrap: wrap; }
  .chip { background: var(--panel2); border: 1px solid var(--line); border-radius: 12px;
    padding: 1px 9px; font-size: 11px; }
  .chip.s-completed { color: var(--good); border-color: var(--good); }
  .chip.s-failed, .chip.s-abandoned { color: var(--bad); border-color: var(--bad); }
  .chip.s-running { color: var(--accent); border-color: var(--accent); }
  .count { margin-bottom: 6px; }
  .wgraph-wrap { border: 1px solid var(--line); border-radius: 6px;
    background: var(--panel2); margin-bottom: 8px; }
  svg.wgraph { width: 100%; height: 240px; display: block; }
  svg.wgraph text { user-select: none; pointer-events: none; }
  .obar { display: flex; height: 10px; border-radius: 5px; overflow: hidden;
    background: var(--panel2); margin: 8px 0; border: 1px solid var(--line); }
  .oseg.ok { background: var(--good); }
  .oseg.run { background: var(--accent); }
  .oseg.bad { background: var(--bad); }
  .item.click { cursor: pointer; }
  .item.click:hover { background: var(--panel2); border-radius: 4px; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none;
    align-items: flex-start; justify-content: center; z-index: 10; padding: 40px 16px; }
  .modal-bg.show { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    width: 100%; max-width: 780px; max-height: 80vh; overflow: auto; }
  .modal > h2 { margin: 0; padding: 10px 14px; font-size: 13px; position: sticky; top: 0;
    background: var(--panel2); border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px; }
  .modal > h2 button { margin-left: auto; background: none; border: 1px solid var(--line);
    color: var(--dim); border-radius: 4px; cursor: pointer; padding: 1px 8px; }
  .modal .mbody { padding: 10px 14px; }
  .arc { font-family: ui-monospace, monospace; font-size: 12px; }
  .arc .ev { display: flex; gap: 8px; padding: 2px 0; border-bottom: 1px solid var(--panel2); white-space: nowrap; }
  .arc .seq { color: var(--dim); min-width: 28px; text-align: right; }
  .arc .kind { color: var(--accent); }
  .arc .det { color: var(--dim); white-space: pre-wrap; }
  .arc .ev.expandable { cursor: pointer; }
  .arc .ev .tog { color: var(--accent); min-width: 12px; }
  .arc .toolio { display: none; margin: 2px 0 6px 40px; padding: 6px 8px; background: var(--panel2);
    border-radius: 4px; white-space: pre-wrap; word-break: break-word; max-height: 260px; overflow: auto;
    color: var(--fg); font-size: 11px; }
  .arc .toolio.show { display: block; }
  .envlist { display: flex; flex-wrap: wrap; gap: 4px; margin: 4px 0 8px; }
  .envlist .tag { background: var(--panel2); color: var(--fg); border-radius: 4px;
    padding: 1px 6px; font-size: 10px; font-family: var(--mono, monospace); }
  .cfgpre { margin: 4px 0; padding: 6px 8px; background: var(--panel2); border-radius: 4px;
    white-space: pre-wrap; word-break: break-word; max-height: 220px; overflow: auto; font-size: 11px; }
  .fbbadge { color: #fff; background: var(--bad); border-radius: 12px; padding: 2px 10px;
    font-size: 11px; font-weight: 600; cursor: pointer; }
  .fbbadge:hover { filter: brightness(1.12); }
  #feedFilter { margin-left: auto; background: var(--panel2); color: var(--fg);
    border: 1px solid var(--line); border-radius: 5px; font: inherit; font-size: 10px;
    padding: 1px 7px; width: 120px; }
  #feedFilter:focus { outline: none; border-color: var(--accent); }
  #feed h2 #clearBtn { margin-left: 6px; }
</style>
</head>
<body>
<header>
  <h1><b>agezt</b> · live monitor</h1>
  <button id="haltBtn" class="act danger" title="Freeze all in-flight runs">⏸ HALT</button>
  <button id="resumeBtn" class="act" title="Clear the halt flag">▶ Resume</button>
  <span id="fbBadge" class="fbbadge" hidden></span>
  <span id="conn">connecting…</span>
</header>

<div class="grid">
  <section class="panel" id="feed">
    <h2>Event Feed <span class="muted" id="evcount">0</span>
      <input id="feedFilter" placeholder="filter kind…" autocomplete="off" spellcheck="false">
      <button id="clearBtn">clear</button></h2>
    <div class="body" id="feedBody"></div>
  </section>

  <section class="panel"><h2>Status <button data-panel="status">↻</button></h2><div class="body" id="status"></div></section>
  <section class="panel"><h2>Config <button data-panel="config">↻</button></h2><div class="body" id="config"></div></section>
  <section class="panel"><h2>Runs <button data-panel="runs">↻</button></h2><div class="body" id="runs"></div></section>
  <section class="panel"><h2>Stats <button data-panel="stats">↻</button></h2><div class="body" id="stats"></div></section>
  <section class="panel"><h2>Budget <button data-panel="budget">↻</button></h2><div class="body" id="budget"></div></section>
  <section class="panel"><h2>Cache <button data-panel="cache">↻</button></h2><div class="body" id="cache"></div></section>
  <section class="panel"><h2>Providers <button data-panel="providers">↻</button></h2><div class="body" id="providers"></div></section>
  <section class="panel"><h2>Tools <button data-panel="tools">↻</button></h2><div class="body" id="tools"></div></section>
  <section class="panel"><h2>Policy <button data-panel="policy">↻</button></h2><div class="body" id="policy"></div></section>
  <section class="panel"><h2>Schedules <button data-panel="schedules">↻</button></h2><div class="body" id="schedules"></div></section>
  <section class="panel"><h2>World <button data-panel="world">↻</button></h2><div class="body" id="world"></div></section>
  <section class="panel"><h2>Skills <button data-panel="skills">↻</button></h2><div class="body" id="skills"></div></section>
  <section class="panel"><h2>Standing <button data-panel="standing">↻</button></h2><div class="body" id="standing"></div></section>
  <section class="panel"><h2>Memory <button data-panel="memory">↻</button></h2><div class="body" id="memory"></div></section>
  <section class="panel"><h2>Approvals <button data-panel="approvals">↻</button></h2><div class="body" id="approvals"></div></section>
  <section class="panel"><h2>Inbox <button data-panel="inbox">↻</button></h2><div class="body" id="inbox"></div></section>
  <section class="panel"><h2>Reflection <button data-panel="reflect">↻</button></h2><div class="body" id="reflect"></div></section>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">Run detail <button id="modalClose">✕</button></h2>
    <div class="mbody" id="modalBody"></div>
  </div>
</div>

<script>
"use strict";
const TOKEN = new URLSearchParams(location.search).get("token") || "";
const qs = TOKEN ? "?token=" + encodeURIComponent(TOKEN) : "";
const MAX_FEED = 300;
let evCount = 0;

// --- safe DOM builders (textContent only; no innerHTML with dynamic data) ---
function el(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text != null) n.textContent = String(text);
  return n;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }
function setBody(id, node) { const b = document.getElementById(id); clear(b); b.appendChild(node); }
function muted(text) { return el("span", "muted", text); }
function chip(text) { return el("span", "chip", text); }
// statusChip colours a run/skill status chip (completed=green, failed/abandoned=red,
// running=accent) via a `s-<status>` class; unknown statuses stay neutral.
function statusChip(status) {
  const s = (status || "").toLowerCase().replace(/[^a-z]/g, "");
  return el("span", "chip s-" + s, status || "?");
}
// outcomeBar renders a flex bar of run outcomes (completed green, running accent,
// failed red), each segment sized by its share. An all-zero bar stays empty.
function outcomeBar(completed, failed, running) {
  const bar = el("div", "obar");
  const seg = (n, cls, label) => {
    if (n <= 0) return;
    const s = el("div", "oseg " + cls);
    s.style.flexGrow = String(n);
    s.title = label + ": " + n;
    bar.appendChild(s);
  };
  seg(completed, "ok", "completed");
  seg(running, "run", "running");
  seg(failed, "bad", "failed");
  return bar;
}

// --- SVG builders for the world node-link graph (same textContent discipline) ---
const SVGNS = "http://www.w3.org/2000/svg";
function svgEl(tag, attrs) {
  const n = document.createElementNS(SVGNS, tag);
  if (attrs) for (const k in attrs) n.setAttribute(k, attrs[k]);
  return n;
}

// worldGraph renders a circular node-link diagram of the world model: one node
// per entity, one arrow per relation (from → to). Returns an <svg>, or null
// when there's too little to draw. Endpoints are matched by entity id; an edge
// whose endpoint is absent (e.g. a forgotten node) is skipped. Nodes are capped
// so a large graph stays legible.
const WGRAPH_MAX = 40;
function worldGraph(ents, edges) {
  const nodes = (ents || []).filter((e) => e && e.id).slice(0, WGRAPH_MAX);
  if (nodes.length < 2) return null;
  const W = 360, H = 240, cx = W / 2, cy = H / 2, R = Math.min(W, H) / 2 - 36, NR = 5;
  const pos = {};
  nodes.forEach((e, i) => {
    const a = (2 * Math.PI * i) / nodes.length - Math.PI / 2;
    pos[e.id] = { x: cx + R * Math.cos(a), y: cy + R * Math.sin(a), e: e, right: Math.cos(a) >= 0 };
  });

  const svg = svgEl("svg", { class: "wgraph", viewBox: "0 0 " + W + " " + H,
    preserveAspectRatio: "xMidYMid meet" });
  const defs = svgEl("defs");
  const marker = svgEl("marker", { id: "wg-arrow", markerWidth: 8, markerHeight: 8,
    refX: 6, refY: 3, orient: "auto", markerUnits: "strokeWidth" });
  marker.appendChild(svgEl("path", { d: "M0,0 L6,3 L0,6 Z", fill: "#6b7585" }));
  defs.appendChild(marker);
  svg.appendChild(defs);

  for (const ed of edges || []) {
    const a = pos[ed.from], b = pos[ed.to];
    if (!a || !b || a === b) continue;
    const dx = b.x - a.x, dy = b.y - a.y, len = Math.hypot(dx, dy) || 1;
    const ux = dx / len, uy = dy / len;
    const line = svgEl("line", {
      x1: a.x + ux * (NR + 1), y1: a.y + uy * (NR + 1),
      x2: b.x - ux * (NR + 4), y2: b.y - uy * (NR + 4),
      stroke: "#2b3446", "stroke-width": 1, "marker-end": "url(#wg-arrow)" });
    const tt = svgEl("title"); tt.textContent = (ed.verb || "relates_to");
    line.appendChild(tt);
    svg.appendChild(line);
  }
  for (const id in pos) {
    const p = pos[id];
    const c = svgEl("circle", { cx: p.x, cy: p.y, r: NR,
      fill: "#131722", stroke: "#58a6ff", "stroke-width": 1.5 });
    const tt = svgEl("title");
    tt.textContent = (p.e.kind ? p.e.kind + ": " : "") + (p.e.name || id);
    c.appendChild(tt);
    svg.appendChild(c);
    const t = svgEl("text", { x: p.x + (p.right ? NR + 3 : -(NR + 3)), y: p.y + 3,
      "text-anchor": p.right ? "start" : "end", "font-size": 9, fill: "#c9d1d9" });
    t.textContent = (p.e.name || "").slice(0, 16);
    svg.appendChild(t);
  }
  return svg;
}

// ---- live event feed (SSE) ----
const feedBody = document.getElementById("feedBody");
const conn = document.getElementById("conn");
const evcount = document.getElementById("evcount");

function clearFeed() { clear(feedBody); evCount = 0; evcount.textContent = "0"; }

// feedFilter holds the current (lowercased) kind substring; "" = show all.
// The feed stays the firehose; filtering only toggles row visibility, so
// switching or clearing the filter is instant and never reconnects the stream.
let feedFilter = "";
function feedMatch(kind) { return !feedFilter || (kind || "").toLowerCase().includes(feedFilter); }
function applyFeedFilter() {
  for (const row of feedBody.children) row.hidden = !feedMatch(row.dataset.kind || "");
}

function addEvent(ev) {
  const row = el("div", "ev");
  row.dataset.kind = ev.kind || "";
  if (!feedMatch(ev.kind || "")) row.hidden = true;
  row.appendChild(el("span", "seq", ev.seq != null ? ev.seq : ""));
  const right = el("span");
  right.appendChild(el("span", "kind", ev.kind || ""));
  right.appendChild(document.createTextNode(" "));
  right.appendChild(el("span", "subj", ev.subject || ""));
  if (ev.actor) right.appendChild(el("span", "meta", " · " + ev.actor));
  row.appendChild(right);
  feedBody.insertBefore(row, feedBody.firstChild);
  while (feedBody.childElementCount > MAX_FEED) feedBody.removeChild(feedBody.lastChild);
  evCount++;
  evcount.textContent = evCount;
  liveRefresh(ev.kind || "");
}

// liveRefresh re-fetches the panel a streamed event most affects, so a run
// finishing or a skill changing shows up immediately rather than at the next
// periodic tick. Debounced per panel to coalesce bursts (a run emits several
// events in a row).
const _refreshTimers = {};
function refreshSoon(panel) {
  clearTimeout(_refreshTimers[panel]);
  _refreshTimers[panel] = setTimeout(() => loadPanel(panel), 400);
}
function liveRefresh(kind) {
  if (kind.startsWith("task.")) { refreshSoon("runs"); refreshSoon("stats"); }
  else if (kind.startsWith("budget.")) { refreshSoon("budget"); refreshSoon("cache"); }
  else if (kind.startsWith("provider.") || kind.startsWith("routing.")) refreshSoon("providers");
  else if (kind.startsWith("schedule.")) refreshSoon("schedules");
  else if (kind.startsWith("skill.")) refreshSoon("skills");
  else if (kind.startsWith("standing.")) refreshSoon("standing");
  else if (kind.startsWith("memory.")) refreshSoon("memory");
  else if (kind.startsWith("world.")) refreshSoon("world");
  else if (kind === "tool.awaiting_approval") refreshSoon("approvals");
  else if (kind.startsWith("tool.")) refreshSoon("tools");
  else if (kind.startsWith("policy.")) refreshSoon("policy");
  else if (kind.startsWith("approval.")) refreshSoon("approvals");
}

function connect() {
  const src = new EventSource("/events" + qs);
  src.onopen = () => { conn.textContent = "● live"; conn.className = "live"; };
  src.onmessage = (m) => { try { addEvent(JSON.parse(m.data)); } catch (e) { /* ignore */ } };
  src.onerror = () => { conn.textContent = "● disconnected — retrying"; conn.className = "down"; };
}

// ---- read panels (fetch → control plane) ----
async function loadPanel(name) {
  setBody(name, muted("loading…"));
  try {
    const res = await fetch("/api/" + name + qs, { headers: { "Accept": "application/json" } });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    setBody(name, (renderers[name] || pre)(data));
  } catch (e) {
    setBody(name, el("span", "err", e.message));
  }
}

// post issues a mutating action (halt/resume/decide) as POST with the token
// and allowlisted params in the query string.
async function post(path, params) {
  const qp = new URLSearchParams(params || {});
  if (TOKEN) qp.set("token", TOKEN);
  const res = await fetch(path + "?" + qp.toString(), { method: "POST" });
  if (!res.ok) {
    let msg = "HTTP " + res.status;
    try { const j = await res.json(); if (j.error) msg = j.error; } catch (e) {}
    throw new Error(msg);
  }
  return res.json();
}

// actBtn builds a small inline action button that POSTs then refreshes a panel.
function actBtn(label, cls, path, params, panel) {
  const b = el("button", "act mini " + (cls || ""), label);
  b.addEventListener("click", async () => {
    b.disabled = true;
    try { await post(path, params); loadPanel(panel); }
    catch (e) { b.textContent = "err"; b.title = e.message; b.disabled = false; }
  });
  return b;
}

function pre(o) { return el("pre", null, JSON.stringify(o, null, 2)); }

function kv(pairs) {
  const dl = el("dl", "kv");
  for (const [k, v] of pairs) { dl.appendChild(el("dt", null, k)); dl.appendChild(el("dd", null, v)); }
  return dl;
}

function listInto(frag, arr, fn, empty) {
  if (!arr || !arr.length) { frag.appendChild(muted(empty || "none")); return frag; }
  for (const x of arr) frag.appendChild(fn(x));
  return frag;
}

// updateFallbackBadge drives the header warning chip from the status payload: a
// non-zero provider-fallback count (a primary provider erroring, runs served by a
// backup) is surfaced prominently instead of buried in the Status panel.
function updateFallbackBadge(d) {
  const badge = document.getElementById("fbBadge");
  if (!badge) return;
  const fb = (d && d.provider_fallbacks) || {};
  const n = +fb.count || 0;
  if (n > 0) {
    badge.textContent = "⚠ " + n + " fallback" + (n === 1 ? "" : "s");
    badge.title = "a provider errored; runs served by a backup"
      + (fb.last_reason ? "\nlast: " + fb.last_reason : "")
      + "\nclick for details";
    badge.hidden = false;
  } else {
    badge.hidden = true;
  }
}

const renderers = {
  status: (d) => {
    updateFallbackBadge(d);
    return kv(Object.entries(d).map(([k, v]) =>
      [k, typeof v === "object" ? JSON.stringify(v) : v]));
  },

  // config: the daemon's resolved config — "what is this daemon running with?".
  // Privacy-safe by construction: env reports PRESENCE only (never values), and
  // system_prompt_set is a bool (never the prompt text).
  config: (d) => {
    const frag = document.createDocumentFragment();
    frag.appendChild(kv([
      ["model", d.model || "—"],
      ["system prompt", d.system_prompt_set ? "set" : "—"],
      ["tools", d.tool_count != null ? d.tool_count : "—"],
      ["plugins", d.plugin_count != null ? d.plugin_count : "—"],
      ["ask policy", d.ask_policy || "—"],
    ]));
    const env = Object.keys(d.env || {}).filter((k) => d.env[k]).sort();
    frag.appendChild(el("div", "count muted", env.length + " env var(s) set"));
    if (env.length) {
      const box = el("div", "envlist");
      for (const k of env) box.appendChild(el("span", "tag", k));
      frag.appendChild(box);
    }
    if (d.paths) {
      frag.appendChild(el("div", "count muted", "paths"));
      frag.appendChild(kv(Object.entries(d.paths).map(([k, v]) => [k, v])));
    }
    if (d.routing) frag.appendChild(el("pre", "cfgpre", JSON.stringify(d.routing, null, 2)));
    return frag;
  },

  runs: (d) => {
    const rs = d.runs || d.Runs || [];
    const frag = document.createDocumentFragment();
    frag.appendChild(el("div", "count muted", rs.length + " run(s)"));
    return listInto(frag, rs, (r) => {
      const row = el("div", "item click");
      const st = r.status || "?";
      row.appendChild(statusChip(r.reason ? st + "·" + r.reason : st));
      if (r.parent_correlation) row.appendChild(muted("↳"));
      row.appendChild(el("span", null, r.intent || r.correlation_id || ""));
      const bits = [];
      if (r.duration_ms != null) bits.push(r.duration_ms + "ms");
      if (r.iters != null) bits.push(r.iters + " it");
      if (r.spent_mc) bits.push("$" + (r.spent_mc / 1e9).toFixed(4));
      if (bits.length) row.appendChild(muted(bits.join(" · ")));
      if (r.correlation_id) row.addEventListener("click", () => openRun(r));
      return row;
    }, "no runs yet");
  },

  stats: (d) => {
    const frag = document.createDocumentFragment();
    const total = d.total || 0;
    frag.appendChild(kv([
      ["runs", total],
      ["success", d.terminal ? Math.round((d.success_rate || 0) * 100) + "%" : "—"],
      ["spend", "$" + ((d.spent_microcents || 0) / 1e9).toFixed(4)],
    ]));
    frag.appendChild(outcomeBar(d.completed || 0, d.failed || 0, d.running || 0));
    const parts = [(d.completed || 0) + " completed", (d.failed || 0) + " failed", (d.running || 0) + " running"];
    if (d.abandoned) parts.push(d.abandoned + " abandoned");
    frag.appendChild(el("div", "count muted", parts.join(" · ")));
    return frag;
  },

  budget: (d) => {
    if (d && d.error) return muted(d.error);
    const frag = document.createDocumentFragment();
    const spent = d.spent_mc || 0;
    const ceil = d.ceiling_mc || 0;
    frag.appendChild(kv([
      ["date", d.utc_date || "—"],
      ["spent", "$" + (spent / 1e9).toFixed(4)],
      ["ceiling", ceil > 0 ? "$" + (ceil / 1e9).toFixed(4) : "unlimited"],
      ["used", ceil > 0 ? Math.round((spent / ceil) * 100) + "%" : "—"],
    ]));
    if (d.strict_pricing) frag.appendChild(muted("strict pricing on"));
    const pt = d.per_task || [];
    if (pt.length) {
      frag.appendChild(el("div", "count muted", pt.length + " per-task cap(s)"));
      for (const r of pt) {
        const row = el("div", "item");
        row.appendChild(chip("$" + ((r.spent_mc || 0) / 1e9).toFixed(4)));
        row.appendChild(el("span", null, r.task_type || "?"));
        if (r.ceiling_mc) row.appendChild(muted("/ $" + (r.ceiling_mc / 1e9).toFixed(4) + " cap"));
        frag.appendChild(row);
      }
    }
    return frag;
  },

  cache: (d) => {
    if (d && d.error) return muted(d.error);
    const frag = document.createDocumentFragment();
    frag.appendChild(kv([
      ["saved", "$" + ((d.saved_microcents || 0) / 1e9).toFixed(4)],
      ["cache reads", (d.cached_input_tokens || 0) + " tok"],
      ["cache writes", (d.cache_write_input_tokens || 0) + " tok"],
      ["priced calls", d.calls || 0],
    ]));
    if (!(d.cached_input_tokens || d.cache_write_input_tokens)) {
      frag.appendChild(muted("no prompt-cache usage recorded"));
    }
    return frag;
  },

  providers: (d) => {
    const frag = document.createDocumentFragment();
    const routed = d.routed || 0;
    frag.appendChild(kv([
      ["routed", routed],
      ["fallbacks", d.fallbacks || 0],
      ["fallback rate", routed ? Math.round((d.fallback_rate || 0) * 100) + "%" : "—"],
    ]));
    const byPrimary = d.by_primary || {};
    const names = Object.keys(byPrimary).sort((a, b) => byPrimary[b] - byPrimary[a]);
    const head = el("div", "count muted", names.length + " provider(s) serving");
    if (names.length || routed) {
      head.appendChild(muted(" · click for routing log"));
      head.className = "count muted item click";
      head.addEventListener("click", openProviderLog);
    }
    frag.appendChild(head);
    listInto(frag, names, (n) => {
      const row = el("div", "item click");
      row.appendChild(chip(byPrimary[n]));
      row.appendChild(el("span", null, n));
      row.addEventListener("click", openProviderLog);
      return row;
    }, "no routing decisions yet");
    const fbBy = d.fallbacks_by_primary || {};
    const fbNames = Object.keys(fbBy).sort((a, b) => fbBy[b] - fbBy[a]);
    if (fbNames.length) {
      frag.appendChild(el("div", "count muted", "fallbacks by provider:"));
      for (const n of fbNames) {
        const row = el("div", "item");
        row.appendChild(el("span", "chip s-failed", fbBy[n]));
        row.appendChild(el("span", null, n));
        frag.appendChild(row);
      }
    }
    return frag;
  },

  tools: (d) => {
    const frag = document.createDocumentFragment();
    const total = d.total || 0;
    frag.appendChild(kv([
      ["calls", total],
      ["errored", d.errored || 0],
      ["error rate", total ? Math.round((d.error_rate || 0) * 100) + "%" : "—"],
    ]));
    const byTool = d.by_tool || {};
    const names = Object.keys(byTool).sort((a, b) => (byTool[b].calls || 0) - (byTool[a].calls || 0));
    const head = el("div", "count muted", (d.tools || names.length) + " tool(s) used");
    if (names.length || total) {
      head.appendChild(muted(" · click for invocation log"));
      head.className = "count muted item click";
      head.addEventListener("click", openToolLog);
    }
    frag.appendChild(head);
    listInto(frag, names, (n) => {
      const t = byTool[n] || {};
      const row = el("div", "item click");
      row.appendChild(chip(t.calls || 0));
      row.appendChild(el("span", null, n));
      if (t.errors) row.appendChild(el("span", "err", t.errors + " err"));
      if (t.avg_ms != null) row.appendChild(muted(t.avg_ms + "ms"));
      row.addEventListener("click", openToolLog);
      return row;
    }, "no tool calls yet");
    return frag;
  },

  policy: (d) => {
    const frag = document.createDocumentFragment();
    const total = d.total || 0;
    const head = el("div", "count muted item click",
      total + " decision(s)" + (total ? " · click for log" : ""));
    if (total) head.addEventListener("click", openPolicyLog);
    frag.appendChild(kv([
      ["allowed", d.allowed || 0],
      ["denied", (d.denied || 0) + (d.hard_denied ? " (" + d.hard_denied + " hard)" : "")],
      ["denial rate", total ? Math.round((d.denial_rate || 0) * 100) + "%" : "—"],
    ]));
    frag.appendChild(head);
    const byCap = d.denied_by_capability || {};
    const names = Object.keys(byCap).sort((a, b) => byCap[b] - byCap[a]);
    if (names.length) {
      frag.appendChild(el("div", "count muted", "denied by capability:"));
      for (const n of names) {
        const row = el("div", "item");
        row.appendChild(el("span", "chip s-failed", byCap[n]));
        row.appendChild(el("span", null, n));
        frag.appendChild(row);
      }
    }
    return frag;
  },

  schedules: (d) => {
    const ss = d.schedules || d.Schedules || [];
    const frag = document.createDocumentFragment();
    frag.appendChild(el("div", "count muted", ss.length + " schedule(s)"));
    return listInto(frag, ss, (s) => {
      const row = el("div", "item");
      row.appendChild(chip(s.cadence || s.mode || "?"));
      row.appendChild(el("span", null, s.intent || s.id || ""));
      if (s.enabled === false) row.appendChild(muted("(paused)"));
      else if (s.next_run_unix) row.appendChild(muted("next " + fmtDateTime(s.next_run_unix * 1000)));
      if (s.last_status) row.appendChild(statusChip(s.last_status));
      return row;
    }, "no schedules");
  },

  world: (d) => {
    const ents = d.entities || d.Entities || [];
    const edges = d.edges || [];
    const rels = d.relations != null ? d.relations
      : (d.relation_count != null ? d.relation_count : edges.length);
    const frag = document.createDocumentFragment();
    frag.appendChild(el("div", "count muted", ents.length + " entities · " + rels + " relations"));
    const g = worldGraph(ents, edges);
    if (g) {
      const wrap = el("div", "wgraph-wrap");
      wrap.appendChild(g);
      frag.appendChild(wrap);
      if (ents.length > WGRAPH_MAX) {
        frag.appendChild(el("div", "count muted", "graph shows first " + WGRAPH_MAX + " of " + ents.length));
      }
    }
    return listInto(frag, ents, (e) => {
      const row = el("div", "item");
      row.appendChild(chip(e.kind || ""));
      row.appendChild(el("span", null, e.name || ""));
      if (e.weight != null) row.appendChild(muted("w=" + e.weight));
      if (e.id) row.appendChild(actBtn("forget", "danger", "/api/world/forget", { id: e.id }, "world"));
      return row;
    }, "no entities");
  },

  skills: (d) => {
    const sk = d.skills || d.Skills || [];
    const frag = document.createDocumentFragment();
    frag.appendChild(el("div", "count muted",
      (d.active != null ? d.active + " active · " : "") + sk.length + " total"));
    return listInto(frag, sk, (s) => {
      const row = el("div", "item");
      row.appendChild(chip(s.status || ""));
      row.appendChild(el("span", null, s.name || ""));
      // Shadow skills show their evaluation progress toward auto-promotion
      // (SPEC-05 §5.2 / M402): "shadow N/M" wins/evals. textContent only.
      const m = s.metrics || {};
      if (s.status === "shadow" && (m.shadow_evals || 0) > 0)
        row.appendChild(el("span", "muted", " shadow " + (m.shadow_wins || 0) + "/" + m.shadow_evals));
      if (s.id) {
        if (s.status === "draft" || s.status === "shadow")
          row.appendChild(actBtn("promote", "ok", "/api/skill/promote", { id: s.id }, "skills"));
        if (s.status === "active")
          row.appendChild(actBtn("quarantine", "danger", "/api/skill/quarantine", { id: s.id }, "skills"));
        row.appendChild(actBtn("revert", "", "/api/skill/revert", { id: s.id }, "skills"));
      }
      return row;
    }, "no skills");
  },

  standing: (d) => {
    // Chronos standing orders (SPEC-16 §4): name, enabled chip, trigger count and
    // initiative mode. Read-only; manage via `agt standing`. textContent only.
    const orders = d.orders || d.Orders || [];
    const frag = document.createDocumentFragment();
    frag.appendChild(el("div", "count muted",
      (d.enabled_count != null ? d.enabled_count + " enabled · " : "") + orders.length + " total"));
    return listInto(frag, orders, (o) => {
      const row = el("div", "item");
      row.appendChild(chip(o.enabled ? "on" : "off"));
      row.appendChild(el("span", null, o.name || o.id || ""));
      const trigs = o.triggers || [];
      if (trigs.length) row.appendChild(muted(trigs.length + " trigger(s)"));
      const ini = o.initiative || {};
      if (ini.mode) row.appendChild(muted(ini.mode));
      return row;
    }, "no standing orders");
  },

  memory: (d) => {
    const ms = d.records || d.Records || (Array.isArray(d) ? d : []);
    const frag = document.createDocumentFragment();
    return listInto(frag, ms, (m) => {
      const row = el("div", "item");
      row.appendChild(el("span", null, m.content || m.subject || m.text || JSON.stringify(m)));
      if (m.id) row.appendChild(actBtn("forget", "danger", "/api/memory/forget", { id: m.id }, "memory"));
      return row;
    }, "no memories");
  },

  inbox: (d) => {
    const items = d.items || d.Items || (Array.isArray(d) ? d : []);
    const frag = document.createDocumentFragment();
    return listInto(frag, items, (i) => {
      const row = el("div", "item");
      row.appendChild(chip(i.channel || i.kind || ""));
      row.appendChild(el("span", null, i.summary || i.text || ""));
      return row;
    }, "inbox empty");
  },

  approvals: (d) => {
    const items = d.pending || d.Pending || [];
    const frag = document.createDocumentFragment();
    frag.appendChild(el("div", "count muted", items.length + " pending"));
    if (!items.length) { frag.appendChild(muted("nothing awaiting approval")); return frag; }
    for (const a of items) {
      const row = el("div", "item");
      row.appendChild(chip(a.capability || a.tool_name || "?"));
      const desc = el("span", null, a.reason || a.tool_name || a.id || "");
      row.appendChild(desc);
      const grant = el("button", "act mini ok", "approve");
      const deny = el("button", "act mini danger", "deny");
      const decide = async (decision) => {
        grant.disabled = deny.disabled = true;
        try {
          await post("/api/decide", { id: a.id, decision });
          loadPanel("approvals");
        } catch (e) {
          desc.textContent = "error: " + e.message;
          grant.disabled = deny.disabled = false;
        }
      };
      grant.addEventListener("click", () => decide("grant"));
      deny.addEventListener("click", () => decide("deny"));
      row.appendChild(grant);
      row.appendChild(deny);
      frag.appendChild(row);
    }
    return frag;
  },

  reflect: (d) => {
    if (d && d.error) return muted(d.error);
    return pre(d);
  },
};

// ---- run detail modal (click a run → its event arc) ----
const modalBg = document.getElementById("modalBg");
const modalBody = document.getElementById("modalBody");
const modalTitle = document.getElementById("modalTitle");
const modalCloseBtn = document.getElementById("modalClose");

function closeModal() { modalBg.classList.remove("show"); clear(modalBody); }
modalCloseBtn.addEventListener("click", closeModal);
modalBg.addEventListener("click", (e) => { if (e.target === modalBg) closeModal(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

// arcDetail extracts a short, human line for a run event (tool name + result,
// budget cost, final answer, failure reason) — best-effort over the payload.
function arcDetail(ev) {
  const p = ev.payload || ev.Payload || {};
  switch (ev.kind) {
    case "tool.invoked": return (p.tool || "") + (p.input ? " " + JSON.stringify(p.input).slice(0, 80) : "");
    case "tool.result": {
      let s = (p.tool || "") + (p.error ? " ✗ " : " ✓ ") + String(p.output || p.result || "").slice(0, 80);
      // Offloaded output (SPEC-04 §3.6): the full bytes live in the artifact
      // store; the event carries a preview + raw_ref. Flag it + name the ref.
      if (p.raw_ref) s += " ⤓ " + (p.output_bytes != null ? p.output_bytes + "B " : "") + "artifact " + String(p.raw_ref).slice(0, 12) + "…";
      return s;
    }
    case "budget.consumed": return (p.model || "") + (p.cost_microcents ? " $" + (p.cost_microcents / 1e9).toFixed(4) : "");
    case "task.completed": return String(p.answer || "").slice(0, 120);
    case "task.failed": return "reason: " + (p.reason || p.error || "");
    case "warden.executed": {
      // Isolation view (SPEC-12 §4 tool-call card / SPEC-07 debug): which warden
      // profile the tool actually ran under, and whether it was downgraded from
      // the requested one. The data is in the journal; surface it instead of a
      // bare "warden.executed" line. Full requested/effective/exit in arcFull.
      const eff = p.profile_effective || "?";
      let s = "isolation " + eff;
      if (p.downgraded) s += " ⚠ downgraded from " + (p.profile_requested || "?");
      if (p.argv0) s += " · " + String(p.argv0).slice(0, 40);
      return s;
    }
    case "policy.decision": {
      // Policy leg of the tool-call card (SPEC-12 §4): did Edict allow this call,
      // and why. Denials / hard-denies / would-ask are the security-relevant
      // cases an operator scans for. Full breakdown in arcFull.
      const verb = p.allow ? "✓ allow" : (p.hard_denied ? "✗ HARD-DENY" : "✗ deny");
      const cap = p.capability || p.tool || "";
      let s = verb + (cap ? " " + cap : "");
      if (p.would_ask) s += " · would-ask";
      if (p.reason) s += " — " + String(p.reason).slice(0, 60);
      return s;
    }
    case "routing.decision": {
      // Which provider/model the Governor picked for this call (and the fallback
      // chain behind it). M382 linked these to the run; surface them here.
      let s = "routed → " + (p.primary || "?");
      if (Array.isArray(p.chain) && p.chain.length > 1) s += " (chain: " + p.chain.join(", ") + ")";
      if (p.task_model) s += " · " + p.task_model;
      return s;
    }
    case "provider.fallback":
      return "fallback " + (p.failed || "?") + " → " + (p.next || "?") +
        (p.reason ? ": " + String(p.reason).slice(0, 60) : "");
    case "capability.degraded":
      // SPEC-15 §2.3: a silently-honoured downgrade (e.g. JSON mode on a
      // non-native model). Worth seeing in the run, not just the journal.
      return "⚠ " + (p.capability || "capability") + " degraded" +
        (p.model ? " on " + p.model : "") + (p.reason ? " — " + String(p.reason).slice(0, 60) : "");
    case "capability.rerouted":
      return "rerouted " + (p.from_model || "?") + " → " + (p.to_model || "?") +
        (p.capability ? " (" + p.capability + ")" : "");
    case "capability.rejected":
      return "✗ rejected — " + (p.model || "?") + " lacks " + (p.capability || "capability");
    case "rate.limited":
      return "rate-limited (used " + (p.used != null ? p.used : "?") + "/" + (p.limit_per_min != null ? p.limit_per_min : "?") + " per min)";
    case "budget.exceeded": {
      const spent = p.spent_microcents != null ? "$" + (p.spent_microcents / 1e9).toFixed(4) : "?";
      const ceil = p.ceiling_microcents != null ? "$" + (p.ceiling_microcents / 1e9).toFixed(4) : "?";
      return "budget exceeded" + (p.scope ? " (" + p.scope + ")" : "") + " " + spent + " / " + ceil;
    }
    case "context.compacted": {
      // Context management (SPEC-10 §3): the loop trimmed its own assembled
      // context to fit the budget by eliding the oldest tool outputs. Surface
      // what was dropped so the compaction is visible in the run, not silent.
      let s = "✂ compacted: elided " + (p.elided != null ? p.elided : "?") + " tool output(s)";
      if (p.reclaimed_chars != null) s += ", −" + p.reclaimed_chars + " chars";
      if (p.context_chars_before != null && p.context_chars_after != null) s += " (" + p.context_chars_before + " → " + p.context_chars_after + ")";
      if (p.budget != null) s += " · budget " + p.budget;
      return s;
    }
    case "llm.response": return p.text_chars != null ? p.text_chars + " chars" : "";
    case "llm.request": {
      // Context inspector (SPEC-10 §3.5): how big was the context and from which
      // source. Compact summary here; full per-role breakdown in arcFull.
      if (p.context_chars == null) return p.messages != null ? p.messages + " msgs" : "";
      const by = p.context_by_role || {};
      const parts = Object.keys(by).sort().map(function (k) { return k + " " + by[k]; });
      return p.context_chars + " ctx chars" + (parts.length ? " · " + parts.join(", ") : "");
    }
    default: return ev.subject || "";
  }
}

// arcFull returns the full, untruncated tool input/output for a tool event (for
// the expandable tool-call-debug view), or "" for events without one. The 80-char
// arcDetail line stays compact; this surfaces the complete payload on demand.
function arcFull(ev) {
  const p = ev.payload || ev.Payload || {};
  if (ev.kind === "tool.invoked") {
    if (p.input == null) return "";
    try { return "input:\n" + JSON.stringify(typeof p.input === "string" ? JSON.parse(p.input) : p.input, null, 2); }
    catch (_) { return "input:\n" + String(p.input); }
  }
  if (ev.kind === "tool.result") {
    const out = p.output != null ? p.output : p.result;
    let s = "";
    if (out != null && out !== "") s = (p.error ? "error:\n" : "output:\n") + String(out);
    // Offloaded output (SPEC-04 §3.6): show the preview, then the ref + how to
    // fetch the full bytes. textContent only — the ref is a 64-hex address.
    if (p.raw_ref) {
      if (s) s += "\n\n";
      s += "⤓ output offloaded to the artifact store (" + (p.output_bytes != null ? p.output_bytes + " bytes" : "large") + ")\n";
      s += "  ref   : " + p.raw_ref + "\n";
      s += "  fetch : agt artifact get " + p.raw_ref;
    }
    return s;
  }
  if (ev.kind === "warden.executed") {
    // The isolation card (SPEC-12 §4 / SPEC-07 debug): requested vs effective
    // warden profile, downgrade flag, and the run facts. Every field is from the
    // journal payload; rendered via textContent (el()) so it stays data, never code.
    let s = "isolation\n";
    s += "  requested : " + (p.profile_requested || "?") + "\n";
    s += "  effective : " + (p.profile_effective || "?") + (p.downgraded ? "  ⚠ DOWNGRADED" : "") + "\n";
    if (p.argv0) s += "  command   : " + p.argv0 + "\n";
    if (p.exit_code != null) s += "  exit code : " + p.exit_code + "\n";
    if (p.duration_ms != null) s += "  duration  : " + p.duration_ms + "ms\n";
    if (p.timed_out) s += "  timed out : yes\n";
    return s;
  }
  if (ev.kind === "policy.decision") {
    // The policy card (SPEC-12 §4 / SPEC-07 debug): Edict's verdict for this tool
    // call. Every field is from the journal payload; rendered via textContent.
    let s = "policy\n";
    s += "  decision   : " + (p.allow ? "allow" : (p.hard_denied ? "hard-deny" : "deny")) + "\n";
    if (p.capability) s += "  capability : " + p.capability + "\n";
    if (p.tool) s += "  tool       : " + p.tool + "\n";
    if (p.would_ask) s += "  would ask  : yes (Ask folded to Allow)\n";
    if (p.reason) s += "  reason     : " + p.reason + "\n";
    return s;
  }
  if (ev.kind === "context.compacted") {
    // Context-management detail (SPEC-10 §3): the full before/after of a
    // compaction pass. Every field is from the journal payload; textContent only.
    let s = "context compaction\n";
    if (p.elided != null) s += "  elided     : " + p.elided + " tool output(s)\n";
    if (p.reclaimed_chars != null) s += "  reclaimed  : " + p.reclaimed_chars + " chars\n";
    if (p.context_chars_before != null) s += "  before     : " + p.context_chars_before + " chars\n";
    if (p.context_chars_after != null) s += "  after      : " + p.context_chars_after + " chars\n";
    if (p.budget != null) s += "  budget     : " + p.budget + " chars\n";
    return s;
  }
  if (ev.kind === "llm.request") {
    // The context inspector: total assembled-context size and a per-source
    // (role) breakdown for this call (SPEC-10 §3.5 / SPEC-07 context inspector).
    if (p.context_chars == null) return "";
    const by = p.context_by_role || {};
    let s = "context: " + p.context_chars + " chars across " + (p.messages != null ? p.messages + " message(s)" : "the call") + "\n";
    for (const k of Object.keys(by).sort()) {
      s += "  " + (k + "         ").slice(0, 10) + ": " + by[k] + " chars\n";
    }
    return s;
  }
  return "";
}

async function openRun(r) {
  modalTitle.firstChild.textContent =
    (r.status || "") + " · " + (r.intent || r.correlation_id) + " ";
  clear(modalBody);
  modalBody.appendChild(muted("loading run events…"));
  modalBg.classList.add("show");
  try {
    const url = "/api/journal" + qs + "&correlation_id=" + encodeURIComponent(r.correlation_id);
    const res = await fetch(url, { headers: { "Accept": "application/json" } });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const evs = data.events || data.Events || [];
    clear(modalBody);
    const head = el("div", "count muted",
      evs.length + " event(s) · " + (r.duration_ms != null ? r.duration_ms + "ms · " : "") +
      (r.iters != null ? r.iters + " iters" : "") +
      (r.spent_mc ? " · $" + (r.spent_mc / 1e9).toFixed(4) : ""));
    modalBody.appendChild(head);
    const arc = el("div", "arc");
    for (const ev of evs) {
      const row = el("div", "ev");
      const full = arcFull(ev);
      // Tool events get an expandable block showing the complete input/output
      // (SPEC-07 tool-call debug) — click the row to toggle it.
      const tog = el("span", "tog", full ? "▸" : "");
      row.appendChild(tog);
      row.appendChild(el("span", "seq", ev.seq != null ? ev.seq : ""));
      row.appendChild(el("span", "kind", ev.kind || ""));
      const det = arcDetail(ev);
      if (det) row.appendChild(el("span", "det", det));
      arc.appendChild(row);
      if (full) {
        row.classList.add("expandable");
        const io = el("pre", "toolio", full);
        row.addEventListener("click", () => {
          const open = io.classList.toggle("show");
          tog.textContent = open ? "▾" : "▸";
        });
        arc.appendChild(io);
      }
    }
    if (!evs.length) arc.appendChild(muted("no events found for this run"));
    modalBody.appendChild(arc);
  } catch (e) {
    clear(modalBody);
    modalBody.appendChild(el("span", "err", e.message));
  }
}

// fmtTime renders an event's unix-ms timestamp as a local wall-clock time, or ""
// when absent. Used by the fallback modal so each event shows when it happened.
function fmtTime(ms) {
  if (!ms) return "";
  try { return new Date(ms).toLocaleTimeString(); } catch (e) { return ""; }
}
// fmtDateTime renders a unix-ms timestamp as a local date+time (a schedule's
// next run can be days out, so the time alone isn't enough).
function fmtDateTime(ms) {
  if (!ms) return "";
  try { return new Date(ms).toLocaleString(); } catch (e) { return ""; }
}

// openFallbacks shows the recent provider.fallback events behind the header
// badge: which provider failed, which backup took over, when, and why. It reuses
// the run-detail modal shell and the read-only /api/journal route (kind filter),
// so a glance at the badge can drill straight into the underlying errors.
async function openFallbacks() {
  modalTitle.firstChild.textContent = "Provider fallbacks ";
  clear(modalBody);
  modalBody.appendChild(muted("loading fallback events…"));
  modalBg.classList.add("show");
  try {
    const url = "/api/journal" + qs + "&kind=provider.fallback&limit=30";
    const res = await fetch(url, { headers: { "Accept": "application/json" } });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    // journal_grep returns events oldest→newest; show the most recent first.
    const evs = (data.events || data.Events || []).slice().reverse();
    clear(modalBody);
    modalBody.appendChild(el("div", "count muted", evs.length + " fallback event(s)"));
    const arc = el("div", "arc");
    for (const ev of evs) {
      const p = ev.payload || ev.Payload || {};
      const row = el("div", "ev");
      row.appendChild(el("span", "seq", ev.seq != null ? ev.seq : ""));
      row.appendChild(el("span", "kind", (p.failed || "?") + " → " + (p.next || "?")));
      const det = [fmtTime(ev.ts_unix_ms), p.reason].filter(Boolean).join(" · ");
      if (det) row.appendChild(el("span", "det", det));
      arc.appendChild(row);
    }
    if (!evs.length) arc.appendChild(muted("no provider fallbacks recorded"));
    modalBody.appendChild(arc);
  } catch (e) {
    clear(modalBody);
    modalBody.appendChild(el("span", "err", e.message));
  }
}

// openProviderLog shows the recent per-call routing timeline behind the Providers
// panel: each routing.decision (which provider was chosen + the fallback chain +
// task type) and each provider.fallback (failed → next + reason), newest-first.
// Reuses the modal shell and the read-only /api/provider_log route.
async function openProviderLog() {
  modalTitle.firstChild.textContent = "Provider routing log ";
  clear(modalBody);
  modalBody.appendChild(muted("loading routing events…"));
  modalBg.classList.add("show");
  try {
    const url = "/api/provider_log" + qs + "&limit=40";
    const res = await fetch(url, { headers: { "Accept": "application/json" } });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const evs = data.events || data.Events || []; // already newest-first
    clear(modalBody);
    modalBody.appendChild(el("div", "count muted", evs.length + " routing event(s)"));
    const arc = el("div", "arc");
    for (const ev of evs) {
      const row = el("div", "ev");
      row.appendChild(el("span", "seq", fmtTime(ev.ts_unix_ms)));
      if (ev.kind === "fallback") {
        row.appendChild(el("span", "kind", "fallback " + (ev.failed || "?") + " → " + (ev.next || "?")));
        if (ev.reason) row.appendChild(el("span", "det", ev.reason));
      } else {
        row.appendChild(el("span", "kind", "route → " + (ev.primary || "?")));
        const det = [ev.task_type, ev.chain ? "chain: " + ev.chain : ""].filter(Boolean).join(" · ");
        if (det) row.appendChild(el("span", "det", det));
      }
      arc.appendChild(row);
    }
    if (!evs.length) arc.appendChild(muted("no routing decisions recorded"));
    modalBody.appendChild(arc);
  } catch (e) {
    clear(modalBody);
    modalBody.appendChild(el("span", "err", e.message));
  }
}

// openToolLog shows the recent tool-invocation timeline behind the Tools panel:
// each call's tool, ok/✗, latency, the input the agent passed, and the output —
// "what did the agent actually run?". Reuses the modal shell + /api/tool_log.
async function openToolLog() {
  modalTitle.firstChild.textContent = "Tool invocation log ";
  clear(modalBody);
  modalBody.appendChild(muted("loading tool calls…"));
  modalBg.classList.add("show");
  try {
    const url = "/api/tool_log" + qs + "&limit=40";
    const res = await fetch(url, { headers: { "Accept": "application/json" } });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const evs = data.invocations || data.Invocations || []; // already newest-first
    clear(modalBody);
    modalBody.appendChild(el("div", "count muted", evs.length + " tool call(s)"));
    const arc = el("div", "arc");
    for (const ev of evs) {
      const row = el("div", "ev");
      row.appendChild(el("span", "seq", fmtTime(ev.ts_unix_ms)));
      const mark = ev.error ? " ✗" : " ✓";
      const lat = ev.duration_ms ? " (" + ev.duration_ms + "ms)" : "";
      row.appendChild(el("span", ev.error ? "err" : "kind", (ev.tool || "?") + mark + lat));
      const det = [ev.input, ev.output].filter(Boolean).map((s) => String(s).slice(0, 100)).join(" → ");
      if (det) row.appendChild(el("span", "det", det));
      arc.appendChild(row);
    }
    if (!evs.length) arc.appendChild(muted("no tool calls recorded"));
    modalBody.appendChild(arc);
  } catch (e) {
    clear(modalBody);
    modalBody.appendChild(el("span", "err", e.message));
  }
}

// openPolicyLog shows the recent policy-decision timeline behind the Policy
// panel: each capability check the Edict engine allowed or denied (with the
// tool, capability, and reason), newest-first. Reuses the modal shell +
// /api/policy_log.
async function openPolicyLog() {
  modalTitle.firstChild.textContent = "Policy decision log ";
  clear(modalBody);
  modalBody.appendChild(muted("loading decisions…"));
  modalBg.classList.add("show");
  try {
    const url = "/api/policy_log" + qs + "&limit=40";
    const res = await fetch(url, { headers: { "Accept": "application/json" } });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const evs = data.decisions || data.Decisions || []; // already newest-first
    clear(modalBody);
    modalBody.appendChild(el("div", "count muted", evs.length + " decision(s)"));
    const arc = el("div", "arc");
    for (const ev of evs) {
      const row = el("div", "ev");
      row.appendChild(el("span", "seq", fmtTime(ev.ts_unix_ms)));
      const verdict = ev.allow ? "allow" : (ev.hard_denied ? "DENY(hard)" : "DENY");
      row.appendChild(el("span", ev.allow ? "kind" : "err",
        verdict + " " + (ev.capability || "") + " " + (ev.tool || "")));
      if (ev.reason) row.appendChild(el("span", "det", ev.reason));
      arc.appendChild(row);
    }
    if (!evs.length) arc.appendChild(muted("no policy decisions recorded"));
    modalBody.appendChild(arc);
  } catch (e) {
    clear(modalBody);
    modalBody.appendChild(el("span", "err", e.message));
  }
}

// ---- operator actions (halt / resume) ----
async function act(path, confirmMsg, btn) {
  if (confirmMsg && !window.confirm(confirmMsg)) return;
  const prev = btn.textContent;
  btn.disabled = true; btn.textContent = "…";
  try {
    await post(path, {});
    btn.textContent = "done"; loadPanel("status");
  } catch (e) {
    btn.textContent = "error"; alert(path + ": " + e.message);
  } finally {
    setTimeout(() => { btn.textContent = prev; btn.disabled = false; }, 1200);
  }
}

// ---- boot ----
document.getElementById("clearBtn").addEventListener("click", clearFeed);
document.getElementById("feedFilter").addEventListener("input", (e) => {
  feedFilter = e.target.value.trim().toLowerCase();
  applyFeedFilter();
});
document.getElementById("haltBtn").addEventListener("click", (e) =>
  act("/api/halt", "Freeze ALL in-flight runs?", e.currentTarget));
document.getElementById("resumeBtn").addEventListener("click", (e) =>
  act("/api/resume", null, e.currentTarget));
document.getElementById("fbBadge").addEventListener("click", openFallbacks);
document.querySelectorAll("button[data-panel]").forEach((b) =>
  b.addEventListener("click", () => loadPanel(b.dataset.panel)));
connect();
const PANELS = ["status", "runs", "stats", "budget", "cache", "providers", "tools", "policy", "schedules", "world", "skills", "memory", "approvals", "inbox", "reflect"];
for (const p of PANELS) loadPanel(p);
// Light periodic refresh of the cheap read panels (the feed is already live).
setInterval(() => { for (const p of ["status", "runs", "stats", "budget", "schedules", "approvals"]) loadPanel(p); }, 10000);
</script>

<!doctype html>
<!-- SPDX-License-Identifier: MIT -->
<!-- Agezt Web UI v1 — server-rendered, SSE-driven, zero build chain.
     One self-contained page: vanilla JS, EventSource for the live feed,
     fetch for the read panels. The token is read from this page's own URL
     (the operator opened /?token=…), so every request re-presents it.

     XSS safety: every value that originates from the bus or the control
     plane (event kinds/subjects, entity names, memory text, …) is rendered
     with textContent via DOM construction — never string-interpolated into
     innerHTML. The only innerHTML use is clearing nodes ("" ). -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agezt · Live Monitor</title>
<style>
  :root {
    --bg: #0b0e14; --panel: #131722; --panel2: #0f1320; --line: #1f2633;
    --fg: #c9d1d9; --dim: #6b7585; --accent: #58a6ff; --good: #3fb950;
    --warn: #d29922; --bad: #f85149; --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg); font: 13px/1.5 var(--mono); }
  header { display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    border-bottom: 1px solid var(--line); background: var(--panel2); position: sticky; top: 0; z-index: 2; }
  header h1 { font-size: 14px; margin: 0; letter-spacing: .5px; }
  header h1 b { color: var(--accent); }
  .act { background: var(--panel); color: var(--fg); border: 1px solid var(--line);
    border-radius: 6px; font: inherit; font-size: 11px; padding: 3px 10px; cursor: pointer; }
  .act:hover { border-color: var(--accent); }
  .act.danger { color: var(--bad); border-color: var(--bad); }
  .act.danger:hover { background: var(--bad); color: #fff; }
  .act.mini { padding: 1px 8px; font-size: 10px; }
  .act.ok { color: var(--good); border-color: var(--good); }
  #conn { margin-left: auto; font-size: 11px; color: var(--dim); }
  #conn.live { color: var(--good); }
  #conn.down { color: var(--bad); }
  .grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 12px; padding: 12px; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
  .panel > h2 { margin: 0; padding: 8px 12px; font-size: 11px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--dim); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 8px; }
  .panel > h2 button { margin-left: auto; background: none; border: 1px solid var(--line);
    color: var(--dim); border-radius: 5px; font: inherit; font-size: 10px; padding: 1px 7px; cursor: pointer; }
  .panel > h2 button:hover { color: var(--fg); border-color: var(--accent); }
  .body { padding: 8px 12px; overflow: auto; }
  #feed { grid-row: span 3; max-height: calc(100vh - 90px); }
  #feed .body { padding: 0; }
  .ev { display: grid; grid-template-columns: 64px 1fr; gap: 8px; padding: 4px 12px;
    border-bottom: 1px solid var(--panel2); white-space: nowrap; }
  .ev:hover { background: var(--panel2); }
  .ev .seq { color: var(--dim); text-align: right; }
  .ev .kind { color: var(--accent); }
  .ev .subj { color: var(--fg); }
  .ev .meta { color: var(--dim); }
  pre { margin: 0; white-space: pre-wrap; word-break: break-word; color: var(--fg); }
  .kv { display: grid; grid-template-columns: auto 1fr; gap: 2px 12px; margin: 0; }
  .kv dt { color: var(--dim); }
  .kv dd { margin: 0; word-break: break-word; }
  .muted { color: var(--dim); }
  .err { color: var(--bad); }
  .item { margin: 3px 0; display: flex; gap: 6px; align-items: baseline; flex-wrap: wrap; }
  .chip { background: var(--panel2); border: 1px solid var(--line); border-radius: 12px;
    padding: 1px 9px; font-size: 11px; }
  .count { margin-bottom: 6px; }
  .wgraph-wrap { border: 1px solid var(--line); border-radius: 6px;
    background: var(--panel2); margin-bottom: 8px; }
  svg.wgraph { width: 100%; height: 240px; display: block; }
  svg.wgraph text { user-select: none; pointer-events: none; }
</style>
</head>
<body>
<header>
  <h1><b>agezt</b> · live monitor</h1>
  <button id="haltBtn" class="act danger" title="Freeze all in-flight runs">⏸ HALT</button>
  <button id="resumeBtn" class="act" title="Clear the halt flag">▶ Resume</button>
  <span id="conn">connecting…</span>
</header>

<div class="grid">
  <section class="panel" id="feed">
    <h2>Event Feed <span class="muted" id="evcount">0</span>
      <button id="clearBtn">clear</button></h2>
    <div class="body" id="feedBody"></div>
  </section>

  <section class="panel"><h2>Status <button data-panel="status">↻</button></h2><div class="body" id="status"></div></section>
  <section class="panel"><h2>World <button data-panel="world">↻</button></h2><div class="body" id="world"></div></section>
  <section class="panel"><h2>Skills <button data-panel="skills">↻</button></h2><div class="body" id="skills"></div></section>
  <section class="panel"><h2>Memory <button data-panel="memory">↻</button></h2><div class="body" id="memory"></div></section>
  <section class="panel"><h2>Approvals <button data-panel="approvals">↻</button></h2><div class="body" id="approvals"></div></section>
  <section class="panel"><h2>Inbox <button data-panel="inbox">↻</button></h2><div class="body" id="inbox"></div></section>
  <section class="panel"><h2>Reflection <button data-panel="reflect">↻</button></h2><div class="body" id="reflect"></div></section>
</div>

<script>
"use strict";
const TOKEN = new URLSearchParams(location.search).get("token") || "";
const qs = TOKEN ? "?token=" + encodeURIComponent(TOKEN) : "";
const MAX_FEED = 300;
let evCount = 0;

// --- safe DOM builders (textContent only; no innerHTML with dynamic data) ---
function el(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text != null) n.textContent = String(text);
  return n;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }
function setBody(id, node) { const b = document.getElementById(id); clear(b); b.appendChild(node); }
function muted(text) { return el("span", "muted", text); }
function chip(text) { return el("span", "chip", text); }

// --- SVG builders for the world node-link graph (same textContent discipline) ---
const SVGNS = "http://www.w3.org/2000/svg";
function svgEl(tag, attrs) {
  const n = document.createElementNS(SVGNS, tag);
  if (attrs) for (const k in attrs) n.setAttribute(k, attrs[k]);
  return n;
}

// worldGraph renders a circular node-link diagram of the world model: one node
// per entity, one arrow per relation (from → to). Returns an <svg>, or null
// when there's too little to draw. Endpoints are matched by entity id; an edge
// whose endpoint is absent (e.g. a forgotten node) is skipped. Nodes are capped
// so a large graph stays legible.
const WGRAPH_MAX = 40;
function worldGraph(ents, edges) {
  const nodes = (ents || []).filter((e) => e && e.id).slice(0, WGRAPH_MAX);
  if (nodes.length < 2) return null;
  const W = 360, H = 240, cx = W / 2, cy = H / 2, R = Math.min(W, H) / 2 - 36, NR = 5;
  const pos = {};
  nodes.forEach((e, i) => {
    const a = (2 * Math.PI * i) / nodes.length - Math.PI / 2;
    pos[e.id] = { x: cx + R * Math.cos(a), y: cy + R * Math.sin(a), e: e, right: Math.cos(a) >= 0 };
  });

  const svg = svgEl("svg", { class: "wgraph", viewBox: "0 0 " + W + " " + H,
    preserveAspectRatio: "xMidYMid meet" });
  const defs = svgEl("defs");
  const marker = svgEl("marker", { id: "wg-arrow", markerWidth: 8, markerHeight: 8,
    refX: 6, refY: 3, orient: "auto", markerUnits: "strokeWidth" });
  marker.appendChild(svgEl("path", { d: "M0,0 L6,3 L0,6 Z", fill: "#6b7585" }));
  defs.appendChild(marker);
  svg.appendChild(defs);

  for (const ed of edges || []) {
    const a = pos[ed.from], b = pos[ed.to];
    if (!a || !b || a === b) continue;
    const dx = b.x - a.x, dy = b.y - a.y, len = Math.hypot(dx, dy) || 1;
    const ux = dx / len, uy = dy / len;
    const line = svgEl("line", {
      x1: a.x + ux * (NR + 1), y1: a.y + uy * (NR + 1),
      x2: b.x - ux * (NR + 4), y2: b.y - uy * (NR + 4),
      stroke: "#2b3446", "stroke-width": 1, "marker-end": "url(#wg-arrow)" });
    const tt = svgEl("title"); tt.textContent = (ed.verb || "relates_to");
    line.appendChild(tt);
    svg.appendChild(line);
  }
  for (const id in pos) {
    const p = pos[id];
    const c = svgEl("circle", { cx: p.x, cy: p.y, r: NR,
      fill: "#131722", stroke: "#58a6ff", "stroke-width": 1.5 });
    const tt = svgEl("title");
    tt.textContent = (p.e.kind ? p.e.kind + ": " : "") + (p.e.name || id);
    c.appendChild(tt);
    svg.appendChild(c);
    const t = svgEl("text", { x: p.x + (p.right ? NR + 3 : -(NR + 3)), y: p.y + 3,
      "text-anchor": p.right ? "start" : "end", "font-size": 9, fill: "#c9d1d9" });
    t.textContent = (p.e.name || "").slice(0, 16);
    svg.appendChild(t);
  }
  return svg;
}

// ---- live event feed (SSE) ----
const feedBody = document.getElementById("feedBody");
const conn = document.getElementById("conn");
const evcount = document.getElementById("evcount");

function clearFeed() { clear(feedBody); evCount = 0; evcount.textContent = "0"; }

function addEvent(ev) {
  const row = el("div", "ev");
  row.appendChild(el("span", "seq", ev.seq != null ? ev.seq : ""));
  const right = el("span");
  right.appendChild(el("span", "kind", ev.kind || ""));
  right.appendChild(document.createTextNode(" "));
  right.appendChild(el("span", "subj", ev.subject || ""));
  if (ev.actor) right.appendChild(el("span", "meta", " · " + ev.actor));
  row.appendChild(right);
  feedBody.insertBefore(row, feedBody.firstChild);
  while (feedBody.childElementCount > MAX_FEED) feedBody.removeChild(feedBody.lastChild);
  evCount++;
  evcount.textContent = evCount;
}

function connect() {
  const src = new EventSource("/events" + qs);
  src.onopen = () => { conn.textContent = "● live"; conn.className = "live"; };
  src.onmessage = (m) => { try { addEvent(JSON.parse(m.data)); } catch (e) { /* ignore */ } };
  src.onerror = () => { conn.textContent = "● disconnected — retrying"; conn.className = "down"; };
}

// ---- read panels (fetch → control plane) ----
async function loadPanel(name) {
  setBody(name, muted("loading…"));
  try {
    const res = await fetch("/api/" + name + qs, { headers: { "Accept": "application/json" } });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    setBody(name, (renderers[name] || pre)(data));
  } catch (e) {
    setBody(name, el("span", "err", e.message));
  }
}

// post issues a mutating action (halt/resume/decide) as POST with the token
// and allowlisted params in the query string.
async function post(path, params) {
  const qp = new URLSearchParams(params || {});
  if (TOKEN) qp.set("token", TOKEN);
  const res = await fetch(path + "?" + qp.toString(), { method: "POST" });
  if (!res.ok) {
    let msg = "HTTP " + res.status;
    try { const j = await res.json(); if (j.error) msg = j.error; } catch (e) {}
    throw new Error(msg);
  }
  return res.json();
}

// actBtn builds a small inline action button that POSTs then refreshes a panel.
function actBtn(label, cls, path, params, panel) {
  const b = el("button", "act mini " + (cls || ""), label);
  b.addEventListener("click", async () => {
    b.disabled = true;
    try { await post(path, params); loadPanel(panel); }
    catch (e) { b.textContent = "err"; b.title = e.message; b.disabled = false; }
  });
  return b;
}

function pre(o) { return el("pre", null, JSON.stringify(o, null, 2)); }

function kv(pairs) {
  const dl = el("dl", "kv");
  for (const [k, v] of pairs) { dl.appendChild(el("dt", null, k)); dl.appendChild(el("dd", null, v)); }
  return dl;
}

function listInto(frag, arr, fn, empty) {
  if (!arr || !arr.length) { frag.appendChild(muted(empty || "none")); return frag; }
  for (const x of arr) frag.appendChild(fn(x));
  return frag;
}

const renderers = {
  status: (d) => kv(Object.entries(d).map(([k, v]) =>
    [k, typeof v === "object" ? JSON.stringify(v) : v])),

  world: (d) => {
    const ents = d.entities || d.Entities || [];
    const edges = d.edges || [];
    const rels = d.relations != null ? d.relations
      : (d.relation_count != null ? d.relation_count : edges.length);
    const frag = document.createDocumentFragment();
    frag.appendChild(el("div", "count muted", ents.length + " entities · " + rels + " relations"));
    const g = worldGraph(ents, edges);
    if (g) {
      const wrap = el("div", "wgraph-wrap");
      wrap.appendChild(g);
      frag.appendChild(wrap);
      if (ents.length > WGRAPH_MAX) {
        frag.appendChild(el("div", "count muted", "graph shows first " + WGRAPH_MAX + " of " + ents.length));
      }
    }
    return listInto(frag, ents, (e) => {
      const row = el("div", "item");
      row.appendChild(chip(e.kind || ""));
      row.appendChild(el("span", null, e.name || ""));
      if (e.weight != null) row.appendChild(muted("w=" + e.weight));
      if (e.id) row.appendChild(actBtn("forget", "danger", "/api/world/forget", { id: e.id }, "world"));
      return row;
    }, "no entities");
  },

  skills: (d) => {
    const sk = d.skills || d.Skills || [];
    const frag = document.createDocumentFragment();
    frag.appendChild(el("div", "count muted",
      (d.active != null ? d.active + " active · " : "") + sk.length + " total"));
    return listInto(frag, sk, (s) => {
      const row = el("div", "item");
      row.appendChild(chip(s.status || ""));
      row.appendChild(el("span", null, s.name || ""));
      if (s.id) {
        if (s.status === "draft" || s.status === "shadow")
          row.appendChild(actBtn("promote", "ok", "/api/skill/promote", { id: s.id }, "skills"));
        if (s.status === "active")
          row.appendChild(actBtn("quarantine", "danger", "/api/skill/quarantine", { id: s.id }, "skills"));
        row.appendChild(actBtn("revert", "", "/api/skill/revert", { id: s.id }, "skills"));
      }
      return row;
    }, "no skills");
  },

  memory: (d) => {
    const ms = d.records || d.Records || (Array.isArray(d) ? d : []);
    const frag = document.createDocumentFragment();
    return listInto(frag, ms, (m) => {
      const row = el("div", "item");
      row.appendChild(el("span", null, m.content || m.subject || m.text || JSON.stringify(m)));
      if (m.id) row.appendChild(actBtn("forget", "danger", "/api/memory/forget", { id: m.id }, "memory"));
      return row;
    }, "no memories");
  },

  inbox: (d) => {
    const items = d.items || d.Items || (Array.isArray(d) ? d : []);
    const frag = document.createDocumentFragment();
    return listInto(frag, items, (i) => {
      const row = el("div", "item");
      row.appendChild(chip(i.channel || i.kind || ""));
      row.appendChild(el("span", null, i.summary || i.text || ""));
      return row;
    }, "inbox empty");
  },

  approvals: (d) => {
    const items = d.pending || d.Pending || [];
    const frag = document.createDocumentFragment();
    frag.appendChild(el("div", "count muted", items.length + " pending"));
    if (!items.length) { frag.appendChild(muted("nothing awaiting approval")); return frag; }
    for (const a of items) {
      const row = el("div", "item");
      row.appendChild(chip(a.capability || a.tool_name || "?"));
      const desc = el("span", null, a.reason || a.tool_name || a.id || "");
      row.appendChild(desc);
      const grant = el("button", "act mini ok", "approve");
      const deny = el("button", "act mini danger", "deny");
      const decide = async (decision) => {
        grant.disabled = deny.disabled = true;
        try {
          await post("/api/decide", { id: a.id, decision });
          loadPanel("approvals");
        } catch (e) {
          desc.textContent = "error: " + e.message;
          grant.disabled = deny.disabled = false;
        }
      };
      grant.addEventListener("click", () => decide("grant"));
      deny.addEventListener("click", () => decide("deny"));
      row.appendChild(grant);
      row.appendChild(deny);
      frag.appendChild(row);
    }
    return frag;
  },

  reflect: (d) => {
    if (d && d.error) return muted(d.error);
    return pre(d);
  },
};

// ---- operator actions (halt / resume) ----
async function act(path, confirmMsg, btn) {
  if (confirmMsg && !window.confirm(confirmMsg)) return;
  const prev = btn.textContent;
  btn.disabled = true; btn.textContent = "…";
  try {
    await post(path, {});
    btn.textContent = "done"; loadPanel("status");
  } catch (e) {
    btn.textContent = "error"; alert(path + ": " + e.message);
  } finally {
    setTimeout(() => { btn.textContent = prev; btn.disabled = false; }, 1200);
  }
}

// ---- boot ----
document.getElementById("clearBtn").addEventListener("click", clearFeed);
document.getElementById("haltBtn").addEventListener("click", (e) =>
  act("/api/halt", "Freeze ALL in-flight runs?", e.currentTarget));
document.getElementById("resumeBtn").addEventListener("click", (e) =>
  act("/api/resume", null, e.currentTarget));
document.querySelectorAll("button[data-panel]").forEach((b) =>
  b.addEventListener("click", () => loadPanel(b.dataset.panel)));
connect();
const PANELS = ["status", "world", "skills", "memory", "approvals", "inbox", "reflect"];
for (const p of PANELS) loadPanel(p);
// Light periodic refresh of the cheap read panels (the feed is already live).
setInterval(() => { for (const p of ["status", "approvals"]) loadPanel(p); }, 10000);
</script>
</body>
</html>
